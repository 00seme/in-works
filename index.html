<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시트 목록</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Pretendard', system-ui, sans-serif;
        background: #f0eeeb;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 40px;
      }
      h1 {
        font-size: 1.4rem;
        font-weight: 900;
        margin-bottom: 8px;
      }
      p {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 32px;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
      a {
        display: block;
        background: #ffffff;
        border: 1px solid rgba(0,0,0,0.1);
        border-radius: 12px;
        padding: 14px 32px;
        text-decoration: none;
        color: #1a1a1a;
        font-weight: 700;
        font-size: 0.95rem;
        width: 240px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        transition: background 120ms;
      }
      a:hover { background: #e8e5e0; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>시트 목록</h1>
      <p>아래에서 시트를 선택하세요.</p>
      <div class="links">
        <a href="./in-works/">IN 작품 메이커</a>
        <!-- 새 시트 추가 시 여기에 <a href="./폴더명/">시트 이름</a> 추가 -->
      </div>
    </div>
  </body>
</html>
